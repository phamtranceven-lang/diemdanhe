<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hôm nay dùng file nào</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#02050a;
  color:#eafff8;
  text-align:center;
}

.container {
  padding:40px;
}

h1 {
  font-size:40px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary { background:#00ff88; }
.danger { background:#ff5470; color:white; }

input {
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>Hôm nay dùng file nào</h1>

<div>
  <input type="date" id="startDateInput">
  <button onclick="saveDate()">Lưu ngày</button>
  <button onclick="resetDate()">Mặc định</button>
</div>

<h2 id="todayText">Loading...</h2>

<button class="primary" onclick="checkin()">✔ Điểm danh</button>
<button class="danger" onclick="resetAll()">Reset</button>

</div>

<script>

const FILES = ["1","2","3","4","5","6","7"];
let blink = null;

function getState(){
  return JSON.parse(localStorage.getItem("data")) || {
    start:null,
    last:null,
    streak:0
  };
}

function saveState(s){
  localStorage.setItem("data", JSON.stringify(s));
}

function today(){
  let d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function diff(a,b){
  return Math.floor((a-b)/86400000);
}

function render(){

  let state = getState();
  let t = today();

  let start = state.start ? new Date(state.start) : null;

  if(!start){
    document.getElementById("todayText").innerText = "Chưa chọn ngày bắt đầu";
    return;
  }

  let day = diff(t,start)+1;

  if(day <= 0){
    document.getElementById("todayText").innerText = "Chưa tới ngày bắt đầu";
    return;
  }

  let files = FILES.slice(0, day>7?7:day);

  let checked = state.last === t.toDateString();

  document.getElementById("todayText").innerText =
    checked ? "✔ "+files.join("+") : "⚠ "+files.join("+");

  // TITLE NHẤP NHÁY
  if(blink) clearInterval(blink);

  if(!checked){
    let toggle=false;
    blink = setInterval(()=>{
      document.title = toggle ? "⚠ CHECK NGAY" : "❗ HÔM NAY";
      toggle=!toggle;
    },1000);
  }else{
    document.title = "✔ DONE";
  }

}

function checkin(){
  let state = getState();
  let t = today();

  if(state.last === t.toDateString()) return;

  if(state.last){
    let d = diff(t, new Date(state.last));
    if(d===1) state.streak++;
    else state.streak=1;
  }else{
    state.streak=1;
  }

  state.last = t.toDateString();

  saveState(state);
  notify("Check-in thành công!");
  render();
}

function resetAll(){
  localStorage.removeItem("data");
  location.reload();
}

function saveDate(){
  let val = document.getElementById("startDateInput").value;
  if(!val) return;

  let state = getState();
  state.start = val;

  saveState(state);
  render();
}

function resetDate(){
  let state = getState();
  state.start = null;
  saveState(state);
  render();
}

function notify(msg){
  if(Notification.permission==="granted"){
    new Notification(msg);
  }
}

function enableNotify(){
  Notification.requestPermission();
}

// INIT
enableNotify();
render();

</script>
</body>
</html>
